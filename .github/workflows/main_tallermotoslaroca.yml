# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - tallermotoslaroca

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1E492A1248B54E208090872262365769 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_872ACD9C975942129A6E140BCB3A4679 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E6862147DFA34027B5B4DFABC3F02022 }}

      - name: Habilitar Oryx build
        run: |
          az webapp config appsettings set \
            --name tallermotoslaroca \
            --resource-group TallerLaRoca-RG \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true
          echo "SCM_DO_BUILD_DURING_DEPLOYMENT=true aplicado. Esperando 15s..."
          sleep 15

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'tallermotoslaroca'
          slot-name: 'Production'

      - name: Configurar startup command y forzar restart
        run: |
          az webapp config set \
            --name tallermotoslaroca \
            --resource-group TallerLaRoca-RG \
            --startup-file "cd /home/site/wwwroot/backend && /antenv/bin/python manage.py migrate --no-input; /antenv/bin/gunicorn --chdir /home/site/wwwroot/backend config.wsgi:application --bind=0.0.0.0:8000 --workers=2 --timeout=600"
          echo "Startup command seteado. Forzando restart..."
          az webapp restart \
            --name tallermotoslaroca \
            --resource-group TallerLaRoca-RG
          echo "Restart forzado. Esperando 120s para que el contenedor arranque..."
          sleep 120
          echo "=== Verificacion final ==="
          curl -s -o /dev/null -w "HTTP %{http_code} despues de %{time_total}s\n" \
            --max-time 60 "https://tallermotoslaroca.azurewebsites.net/api/login/" \
            || echo "Sin respuesta en 60s"
