# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - tallermotoslaroca

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1E492A1248B54E208090872262365769 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_872ACD9C975942129A6E140BCB3A4679 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E6862147DFA34027B5B4DFABC3F02022 }}

      - name: 'Diagnostico: confirmar que el recurso gestionado es el que sirve el dominio publico'
        run: |
          set +e
          echo "::notice::Apps llamadas 'tallermotoslaroca' en la suscripcion (nombre|resourceGroup|defaultHostName|state):"
          az webapp list --query "[?contains(name,'tallermotoslaroca')].[name,resourceGroup,defaultHostName,state]" -o tsv \
            | while IFS=$'\t' read -r n rg h st; do echo "::notice::APP: $n | $rg | $h | $st"; done

          hostnames=$(az webapp show --name tallermotoslaroca --resource-group TallerLaRoca-RG \
            --query "{default:defaultHostName,hostNames:hostNames}" -o json 2>&1)
          echo "::notice::Detalle del recurso gestionado (tallermotoslaroca/TallerLaRoca-RG): $hostnames"
          set -e

      - name: Habilitar Oryx build y deshabilitar Run-From-Package
        run: |
          # Cambiar appsettings reinicia el contenedor SCM. Si el deploy arranca
          # mientras ese reinicio sigue en curso, Azure lo mata a mitad de camino
          # ("Deployment has been stopped due to SCM container restart"). Por eso
          # solo tocamos los settings cuando realmente difieren, y si los tocamos,
          # esperamos lo suficiente para que el contenedor termine de reiniciar.
          actuales=$(az webapp config appsettings list \
            --name tallermotoslaroca \
            --resource-group TallerLaRoca-RG \
            --query "[?name=='SCM_DO_BUILD_DURING_DEPLOYMENT' || name=='WEBSITE_RUN_FROM_PACKAGE'].[name,value]" \
            -o tsv)
          scm_ok=$(echo "$actuales" | awk -F'\t' '$1=="SCM_DO_BUILD_DURING_DEPLOYMENT" && $2=="true"')
          rfp_ok=$(echo "$actuales" | awk -F'\t' '$1=="WEBSITE_RUN_FROM_PACKAGE" && $2=="0"')

          if [ -n "$scm_ok" ] && [ -n "$rfp_ok" ]; then
            echo "Settings ya estaban correctos, no se reinicia el contenedor."
          else
            az webapp config appsettings set \
              --name tallermotoslaroca \
              --resource-group TallerLaRoca-RG \
              --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true WEBSITE_RUN_FROM_PACKAGE=0
            echo "Settings aplicados (hubo cambio). Esperando 90s a que el contenedor SCM termine de reiniciar..."
            sleep 90
          fi

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'tallermotoslaroca'
          slot-name: 'Production'

      - name: 'Diagnostico: historial de deployments e instancias activas'
        if: always()
        run: |
          set +e
          echo "::notice::Ultimos 3 deployments (id|status|complete|active|end_time):"
          az webapp deployment list --name tallermotoslaroca --resource-group TallerLaRoca-RG \
            --query "sort_by(@,&end_time)[-3:].[id,status,complete,active,end_time]" -o tsv 2>&1 \
            | while IFS=$'\t' read -r id st comp act endt; do echo "::notice::DEPLOY: $id | status=$st | complete=$comp | active=$act | end=$endt"; done

          echo "::notice::Instancias activas del App Service:"
          az webapp list-instances --name tallermotoslaroca --resource-group TallerLaRoca-RG \
            --query "[].[name,state]" -o tsv 2>&1 \
            | while IFS=$'\t' read -r n st; do echo "::notice::INSTANCIA: $n | $st"; done
          set -e

      - name: Configurar startup command y forzar restart
        run: |
          az webapp config set \
            --name tallermotoslaroca \
            --resource-group TallerLaRoca-RG \
            --startup-file "bash /home/site/wwwroot/backend/startup.sh"
          echo "Startup command seteado. Forzando restart..."
          az webapp restart \
            --name tallermotoslaroca \
            --resource-group TallerLaRoca-RG
          echo "Restart forzado. Esperando 120s para que el contenedor arranque..."
          sleep 120
          echo "=== Verificacion final ==="
          curl -s -o /dev/null -w "HTTP %{http_code} despues de %{time_total}s\n" \
            --max-time 60 "https://tallermotoslaroca.azurewebsites.net/api/login/" \
            || echo "Sin respuesta en 60s"
          echo "Startup command seteado (segunda pasada). Forzando restart..."
          az webapp restart \
            --name tallermotoslaroca \
            --resource-group TallerLaRoca-RG
          echo "Restart forzado. Esperando 120s para que el contenedor arranque..."
          sleep 120
          echo "=== Verificacion final ==="
          curl -s -o /dev/null -w "HTTP %{http_code} despues de %{time_total}s\n" \
            --max-time 60 "https://tallermotoslaroca.azurewebsites.net/api/login/" \
            || echo "Sin respuesta en 60s"

      - name: 'Diagnostico: comparar archivo desplegado vs WEBSITE_RUN_FROM_PACKAGE'
        if: always()
        run: |
          set +e
          rfp_post_build=$(az webapp config appsettings list \
            --name tallermotoslaroca \
            --resource-group TallerLaRoca-RG \
            --query "[?name=='WEBSITE_RUN_FROM_PACKAGE'].value | [0]" -o tsv 2>&1)
          echo "::notice::WEBSITE_RUN_FROM_PACKAGE despues del build de Oryx: '$rfp_post_build'"

          creds=$(az webapp deployment list-publishing-credentials \
            --name tallermotoslaroca \
            --resource-group TallerLaRoca-RG \
            --query "{u:publishingUserName,p:publishingPassword}" -o tsv 2>&1)
          if [ $? -ne 0 ]; then
            echo "::notice::No se pudieron obtener credenciales de Kudu (sin detalles por seguridad)."
          else
            kuduUser=$(echo "$creds" | cut -f1)
            kuduPass=$(echo "$creds" | cut -f2)

            http_code=$(curl -s -o /tmp/remote_urls.py -w "%{http_code}" -u "$kuduUser:$kuduPass" \
              "https://tallermotoslaroca.scm.azurewebsites.net/api/vfs/site/wwwroot/backend/config/urls.py")
            echo "::notice::Kudu VFS respondio HTTP $http_code al leer urls.py"
            if [ "$http_code" = "200" ] && grep -q "vincular-cliente" /tmp/remote_urls.py; then
              echo "::notice::El archivo urls.py EN EL SERVIDOR ya contiene la ruta nueva."
            elif [ "$http_code" = "200" ]; then
              echo "::notice::El archivo urls.py EN EL SERVIDOR NO contiene la ruta nueva (deploy no llego al disco)."
            else
              echo "::notice::No se pudo leer el archivo via Kudu VFS (HTTP $http_code)."
            fi
          fi
          set -e

      - name: 'Verificar que el codigo desplegado sea el del commit actual'
        run: |
          # api/usuarios/<id>/vincular-cliente/ solo existe en urls.py a partir de este commit.
          # Si el servidor responde 404, el deploy NO tomo el codigo nuevo (sigue corriendo el anterior).
          codigo=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 -X POST \
            "https://tallermotoslaroca.azurewebsites.net/api/usuarios/0/vincular-cliente/")
          echo "Codigo HTTP recibido: $codigo"
          if [ "$codigo" = "404" ]; then
            echo "::error::El backend sigue sirviendo codigo viejo (ruta nueva no encontrada). El deploy no se aplico realmente."
            exit 1
          fi
